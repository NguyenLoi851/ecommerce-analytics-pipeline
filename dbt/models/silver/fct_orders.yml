version: 2

models:
  - name: fct_orders
    description: >
      Conformed order fact table. One row per order_id, sourced from bronze.orders.
      Enriched with derived delivery performance columns:
      actual_delivery_days, estimated_delivery_days, and delivery_delay_days
      (positive = late, negative = early).
    columns:
      - name: order_id
        description: "Unique order identifier."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Foreign key to dim_customers.customer_id."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_status
        description: "Current order lifecycle status."
        tests:
          - not_null
          - accepted_values:
              values:
                - created
                - approved
                - invoiced
                - processing
                - shipped
                - delivered
                - unavailable
                - canceled
      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed."
        tests: [not_null]
      - name: order_approved_at
        description: "Timestamp when payment was approved (may be NULL for canceled orders)."
      - name: order_delivered_carrier_date
        description: "Timestamp when order was handed to the carrier."
      - name: order_delivered_customer_date
        description: "Timestamp when order was delivered to the customer."
      - name: order_estimated_delivery_date
        description: "Estimated delivery date promised at purchase."
      - name: is_delivered
        description: "True when order_status = 'delivered' and a delivery date is present."
        tests: [not_null]
      - name: actual_delivery_days
        description: "Calendar days from purchase to actual delivery (NULL if not yet delivered)."
      - name: estimated_delivery_days
        description: "Calendar days from purchase to estimated delivery."
      - name: delivery_delay_days
        description: "Positive = delivered late vs estimate; negative = early (NULL if undelivered)."
      - name: _ingest_ts
        tests: [not_null]
      - name: _batch_id
        tests: [not_null]
